<!DOCTYPE html>
<html lang="en">
<head>

    <title>Sakshi's ICSE Biology Lab | Grade 7</title>
    <style>
        :root {
            /* Kept the premium medical pink/red theme for Grade 7! */
            --primary: #ff3366; 
            --bg: #0f172a;
            --panel: #1e293b;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        #sidebar {
            width: 300px;
            background: var(--panel);
            padding: 35px 20px;
            border-right: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.6rem; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { font-size: 0.8rem; opacity: 0.5; margin-bottom: 40px; }

        .topic-btn {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            background: #0f172a;
            border: 1px solid rgba(255, 51, 102, 0.2);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .topic-btn:hover { 
            background: var(--primary); 
            color: #fff; 
            transform: translateX(10px);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }

        #viewport { 
            flex-grow: 1; 
            background: #000;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        #footer {
            margin-top: auto;
            font-size: 0.75rem;
            opacity: 0.4;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="sidebar">
